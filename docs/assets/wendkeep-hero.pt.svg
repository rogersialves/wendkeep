<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="wendkeep — memória persistente para agentes de código, mostrada como um grafo de conhecimento de sessões, decisões, bugs, aprendizados e mudanças">
  <defs>
    <radialGradient id="vig" cx="72%" cy="30%" r="75%">
      <stop offset="30%" stop-color="#141824" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d0f16"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="#0d0f16"/>
  <rect width="1200" height="520" fill="url(#vig)"/>

  <!-- grafo (direita) -->
  <g stroke="#242938" stroke-width="1.4" opacity="0.95">
    <line x1="770" y1="160" x2="880" y2="96"/>
    <line x1="770" y1="160" x2="678" y2="96"/>
    <line x1="770" y1="160" x2="712" y2="250"/>
    <line x1="770" y1="160" x2="880" y2="212"/>
    <line x1="770" y1="160" x2="910" y2="272"/>
    <line x1="910" y1="272" x2="880" y2="212"/>
    <line x1="910" y1="272" x2="1036" y2="230"/>
    <line x1="910" y1="272" x2="1010" y2="352"/>
    <line x1="910" y1="272" x2="742" y2="366"/>
    <line x1="742" y1="366" x2="632" y2="322"/>
    <line x1="742" y1="366" x2="662" y2="446"/>
    <line x1="742" y1="366" x2="836" y2="430"/>
    <line x1="742" y1="366" x2="880" y2="212"/>
  </g>

  <g filter="url(#soft)" opacity="0.5">
    <circle cx="770" cy="160" r="16" fill="#4c8dff"/>
    <circle cx="910" cy="272" r="16" fill="#4c8dff"/>
    <circle cx="742" cy="366" r="16" fill="#4c8dff"/>
    <circle cx="880" cy="96" r="10" fill="#a970ff"/>
    <circle cx="678" cy="96" r="10" fill="#ff5c6c"/>
    <circle cx="712" cy="250" r="10" fill="#3fb950"/>
    <circle cx="880" cy="212" r="10" fill="#e8b24a"/>
    <circle cx="1036" cy="230" r="10" fill="#a970ff"/>
    <circle cx="1010" cy="352" r="10" fill="#3fb950"/>
    <circle cx="632" cy="322" r="10" fill="#ff5c6c"/>
    <circle cx="662" cy="446" r="10" fill="#3fb950"/>
    <circle cx="836" cy="430" r="10" fill="#e8b24a"/>
  </g>

  <g>
    <circle cx="880" cy="96" r="6.5" fill="#a970ff"/>
    <circle cx="678" cy="96" r="6.5" fill="#ff5c6c"/>
    <circle cx="712" cy="250" r="6.5" fill="#3fb950"/>
    <circle cx="880" cy="212" r="7" fill="#e8b24a"/>
    <circle cx="1036" cy="230" r="6.5" fill="#a970ff"/>
    <circle cx="1010" cy="352" r="6.5" fill="#3fb950"/>
    <circle cx="632" cy="322" r="6.5" fill="#ff5c6c"/>
    <circle cx="662" cy="446" r="6.5" fill="#3fb950"/>
    <circle cx="836" cy="430" r="7" fill="#e8b24a"/>
    <circle cx="770" cy="160" r="10" fill="#4c8dff" stroke="#0d0f16" stroke-width="2"/>
    <circle cx="910" cy="272" r="10" fill="#4c8dff" stroke="#0d0f16" stroke-width="2"/>
    <circle cx="742" cy="366" r="10" fill="#4c8dff" stroke="#0d0f16" stroke-width="2"/>
