  <g fill="#8b90a3" font-size="12" opacity="0.9">
    <text x="786" y="150">sessão</text>
    <text x="926" y="262">sessão</text>
    <text x="600" y="384">sessão</text>
  </g>

  <!-- texto (esquerda) -->
  <g>
    <rect x="64" y="64" width="34" height="34" rx="8" fill="none" stroke="#e8b24a" stroke-width="1.6"/>
    <text x="81" y="87" fill="#e8b24a" font-size="17" font-weight="700" text-anchor="middle">wk</text>
    <text x="116" y="87" fill="#e7e9f0" font-size="19" font-weight="600">wendkeep</text>
  </g>

  <text x="66" y="150" fill="#8b90a3" font-size="12.5" letter-spacing="3">MEMÓRIA PERSISTENTE · ZERO DEPENDÊNCIAS · LOCAL</text>

  <text x="64" y="212" fill="#e7e9f0" font-size="40" font-weight="600">Seu agente de código</text>
  <text x="64" y="262" fill="#e7e9f0" font-size="40" font-weight="600">esquece cada sessão.</text>
  <text x="64" y="326" fill="#e8b24a" font-size="40" font-weight="600">Faça ele guardar.</text>

  <text x="66" y="386" fill="#8b90a3" font-size="15">Sessões, decisões, bugs, aprendizados e mudanças —</text>
  <text x="66" y="408" fill="#8b90a3" font-size="15">capturados em Markdown, wikilinkados num só grafo.</text>

  <g>
    <rect x="64" y="440" width="342" height="42" rx="9" fill="#141824" stroke="#242938"/>
    <text x="82" y="467" fill="#e8b24a" font-size="14">$</text>
    <text x="100" y="467" fill="#e7e9f0" font-size="14">npm i -D wendkeep &amp;&amp; npx wendkeep init</text>
  </g>
